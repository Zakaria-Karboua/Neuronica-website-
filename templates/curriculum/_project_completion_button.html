<form method="post" action="{% url 'curriculum:toggle_project_complete' project.id %}"
      hx-post="{% url 'curriculum:toggle_project_complete' project.id %}"
      hx-target="#project-completion-slot" hx-swap="innerHTML">
  {% csrf_token %}
  <button type="submit" class="theme-toggle">
    {% if is_completed %}✅ Docked & Completed{% else %}⬜ Mark station complete{% endif %}
  </button>
</form>
